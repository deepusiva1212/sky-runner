<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0014"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Sky Runner</title>
  

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>

  <!-- Three.js from CDN — loaded before our bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      width:100%; height:100%; background:#0a0014; overflow:hidden;
      font-family:'Baloo 2','Nunito',sans-serif;
      -webkit-font-smoothing:antialiased; touch-action:none;
    }

    /* Game container fills the screen */
    #game-container {
      position:relative; width:100%; height:100%;
      max-width:480px; margin:0 auto; overflow:hidden;
      background:#0a0014;
    }

    /* Loading screen */
    #loading {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      background:linear-gradient(180deg,#0a0014,#1a0533); z-index:999;
    }
    .loading-logo { font-size:64px; animation:loadBounce 1s ease-in-out infinite; }
    .loading-title { font-size:28px; font-weight:900; color:#fff; letter-spacing:-0.5px; }
    .loading-bar-track {
      width:200px; height:6px; background:rgba(255,255,255,0.15);
      border-radius:99px; overflow:hidden;
    }
    .loading-bar-fill {
      height:100%; border-radius:99px;
      background:linear-gradient(90deg,#FF6FA5,#C04CFF);
      animation:loadFill 1.5s ease forwards;
    }
    .loading-sub { font-size:12px; color:rgba(255,255,255,0.45); font-weight:600; }

    @keyframes loadBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    @keyframes loadFill   { 0%{width:0%} 100%{width:100%} }

    /* ── GLOBAL ANIMATION KEYFRAMES (used by all scenes/systems) ── */
    @keyframes srFadeIn    { from{opacity:0;} to{opacity:1;} }
    @keyframes srBounce    { 0%{transform:scale(0.3);opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
    @keyframes srPopFloat  { 0%{opacity:1;transform:translate(-50%,-50%) scale(1);} 100%{opacity:0;transform:translate(-50%,-120%) scale(1.4);} }
    @keyframes srShake     { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
    @keyframes srGlow      { 0%,100%{box-shadow:0 0 10px rgba(255,111,165,0.4);} 50%{box-shadow:0 0 24px rgba(255,111,165,0.8);} }
    @keyframes srSpin      { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    @keyframes srPulse     { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

    /* Scrollbar for shop/menu panels */
    ::-webkit-scrollbar { width:3px; height:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:99px; }
  </style>
</head>
<body>

<div id="game-container">
  <!-- Loading screen (removed once JS loads) -->
  <div id="loading">
    <div class="loading-logo">🏃</div>
    <div class="loading-title">SKY RUNNER</div>
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-sub">Deepu Siva Private Limited</div>
  </div>
</div>

<script>
  // Three.js is loaded from CDN above.
  // We re-export it as an ES module shim so our import * as THREE works.
  // This avoids needing a build tool for the CDN approach.
  window.__THREE__ = THREE;
</script>

<!-- Our bundled game (generated by: npm run build) -->
<!-- In dev, use: npm run dev  and load bundle.js directly -->
<script>
  // Inline shim: make THREE importable as ES module
  // When using esbuild (npm run build), this file is replaced by bundle.js
  // For GitHub Pages / no-build deployment, we inline the module here:

  // Hide loading screen after a short delay
  setTimeout(() => {
    const loading = document.getElementById('loading');
    if (loading) {
      loading.style.transition = 'opacity .4s ease';
      loading.style.opacity = '0';
      setTimeout(() => loading.remove(), 400);
    }
  }, 1400);
</script>

<!-- Bundle (generated by npm run build → public/bundle.js) -->
<script src="bundle.js" type="module" onerror="showBundleError()"></script>

<script>
function showBundleError() {
  // bundle.js not found (not built yet) — show dev instructions
  const c = document.getElementById('game-container');
  const loading = document.getElementById('loading');
  if (loading) loading.remove();
  c.innerHTML = `
    <div style="
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;
      background:linear-gradient(180deg,#0a0014,#1a0533);
      font-family:'Baloo 2',sans-serif;padding:32px;text-align:center;
    ">
      <div style="font-size:48px;">🏗️</div>
      <div style="font-size:20px;font-weight:800;color:#fff;">Almost ready!</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.65);line-height:1.6;max-width:300px;">
        Run <code style="background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:6px;color:#FF6FA5;">npm install && npm run build</code>
        in the SkyRunner folder to generate bundle.js, then open index.html again.
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px;">
        Or run <code style="color:#C04CFF;">npm start</code> for live dev server.
      </div>
    </div>
  `;
}
</script>

</body>
</html>
